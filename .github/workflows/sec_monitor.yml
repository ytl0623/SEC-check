name: SEC Filing Monitor

on:
  schedule:
    - cron: "0 * * * *"     # every hour
  workflow_dispatch:         # manual trigger from Actions tab

jobs:
  check-filings:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create/update GitHub Releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Check for new SEC filings
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup needed
          GITHUB_REPOSITORY:   ${{ github.repository }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}    # optional
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}  # optional
          NTFY_TOPIC:          ${{ secrets.NTFY_TOPIC }}           # optional
        run: python check_sec.py
